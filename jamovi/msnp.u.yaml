title: Single Nucleotide Polymorphism
name: mSNP
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Markers
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Outcome Variable (Case/Control)
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covs
            isTarget: true
      - type: TargetLayoutBox
        label: Group
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Sex Variable (for X-linked HWE)
        children:
          - type: VariablesListBox
            name: gender
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Frequency Tables
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: freqTable
      - type: CheckBox
        name: groupTable
        enable: ({ return ui['group'].value() !== null; })
        children:
          - type: CheckBox
            name: groupAlleles
            enable: ({ return ui['groupTable'].value() && ui['group'].value() !== null; })
          - type: CheckBox
            name: polyDf1
            enable: ({ return ui['groupTable'].value() && ui['group'].value() !== null; })
          - type: CheckBox
            name: groupTotal
            enable: ({ return ui['groupTable'].value() && ui['group'].value() !== null; })
      - type: CheckBox
        name: freqPct

  - type: CollapseBox
    label: Hardy-Weinberg Equilibrium (HWE) Analysis
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: hwTests
        children:
          - type: ComboBox
            name: alpha
            enable: (hwTests)
          - type: CheckBox
            name: hwPerm
            enable: (hwTests)
            children:
              - type: TextBox
                name: nPerm
                enable: (hwTests && hwPerm)
      - type: CheckBox
        name: ternaryPlot
        children:
          - type: ComboBox
            name: ternaryRegion
            enable: (ternaryPlot)
          - type: CheckBox
            name: ternaryShowMAF
            enable: (ternaryPlot)
      - type: CheckBox
        name: qqPlot
      - type: CheckBox
        name: barPlot
      - type: CheckBox
        name: hweSplitOutcome
        enable: ({ return ui['outcome'].value() !== null; })
      - type: CheckBox
        name: xLinked
        enable: ({ return ui['gender'].value() !== null; })

  - type: CollapseBox
    label: Phenotype Association Tests
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: assocEnable
        children:
          - type: ComboBox
            name: geneticModel
            enable: (assocEnable)
          - type: CheckBox
            name: assocForest
            enable: (assocEnable)
            children:
              - type: CheckBox
                name: assocForestTrunc
                enable: (assocEnable && assocForest)
          - type: CheckBox
            name: manhattanPlot
            enable: (assocEnable)

  - type: CollapseBox
    label: Population genetics metrics
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: popMetrics
        children:
          - type: ComboBox
            name: mafThreshold
            enable: (popMetrics)

  - type: CollapseBox
    label: Quality Control (QC) Filters
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: qcCallRate
      - type: ComboBox
        name: qcMaf
      - type: ComboBox
        name: qcHwe

  - type: CollapseBox
    label: Multifactor Dimensionality Reduction (MDR)
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: mdrEnable
        children:
          - type: ComboBox
            name: mdrOrder
            enable: (mdrEnable)
          - type: ComboBox
            name: mdrFolds
            enable: (mdrEnable)
          - type: CheckBox
            name: mdrPermTest
            enable: (mdrEnable)
            children:
              - type: TextBox
                name: nPermMDR
                enable: (mdrEnable && mdrPermTest)
          - type: TextBox
            name: mdrSeed
            enable: (mdrEnable)
          - type: CheckBox
            name: mdrCellTable
            enable: (mdrEnable)
          - type: CheckBox
            name: mdrHeatmap
            enable: (mdrEnable)
          - type: CheckBox
            name: mdrBarPlot
            enable: (mdrEnable)

  - type: CollapseBox
    label: Linkage Disequilibrium (LD) Analysis
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: ldEnable
        children:
          - type: CheckBox
            name: ldTable
            enable: (ldEnable)
          - type: CheckBox
            name: ldHeatmap
            enable: (ldEnable)
            children:
              - type: ComboBox
                name: ldMetric
                enable: (ldEnable && ldHeatmap)

  - type: CollapseBox
    label: Multiple testing correction
    collapsed: false
    stretchFactor: 1
    children:
      - type: ComboBox
        name: adjust

  - type: CollapseBox
    label: Polygenic Risk Score (PRS)
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: prsOutput

...
