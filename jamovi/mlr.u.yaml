title: Logistic Regression
name: mLR
jus: '3.0'
stage: 0
compilerMode: wild
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Dependent Variable (Target)
        children:
          - type: VariablesListBox
            name: dep
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates (Continuous Predictors)
        children:
          - type: VariablesListBox
            name: covs
            isTarget: true
      - type: TargetLayoutBox
        label: Factors (Categorical Predictors)
        children:
          - type: VariablesListBox
            name: factors
            isTarget: true
      - type: TargetLayoutBox
        label: Filter Variable
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
            fitToGrid: true
          - type: LevelSelector
            label: ''
            name: selgroup
            enable: ({return ui['group'].value()!==null;})
  - type: CollapseBox
    label: Feature Selection Settings
    collapsed: false
    children:
      - name: method
        type: ComboBox
        label: Feature Selection Method
      - name: elastic_alpha
        type: TextBox
        label: ElasticNet Alpha (L1 Ratio, 0=Ridge, 1=LASSO)
        format: number
        enable: (method:elastic)
      - name: lasso_penalty
        type: ComboBox
        label: Regularization Penalty Optimization
        enable: (method:lasso || method:elastic)
  - type: CollapseBox
    label: Validation Settings
    collapsed: true
    children:
      - name: partition
        type: ComboBox
        label: Validation Method
      - name: val_split
        type: TextBox
        label: Hold-out Validation Split (%)
        format: number
        enable: (partition:holdout)
      - name: cv_folds
        type: TextBox
        label: Cross-Validation Folds (K)
        format: number
        enable: (partition:kfold || partition:repeated_kfold)
      - name: cv_repeats
        type: TextBox
        label: Cross-Validation Repeats (R)
        format: number
        enable: (partition:repeated_kfold)
      - name: seed
        type: TextBox
        label: Seed number
        format: number
  - type: CollapseBox
    label: Outputs & Evaluation
    collapsed: false
    children:
      - name: show_formula
        type: CheckBox
        label: Show Mathematical Model Formula
      - name: show_roc
        type: CheckBox
        label: Show ROC Analysis curves
        children:
          - name: roc_x
            type: ComboBox
            label: X-axis Coordinate
            enable: (show_roc)
          - name: roc_unit
            type: ComboBox
            label: Axis Units
            enable: (show_roc)
          - name: palBrewer
            type: ComboBox
            label: Brewer's qualitative palette
            enable: (show_roc)
  - type: CollapseBox
    label: Сохранить
    collapsed: true
    children:
      - type: Output
        name: predClass
      - type: Output
        name: predProb
