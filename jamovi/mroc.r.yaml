---
name:  mROC
title: ROC classification
jrs:   '1.1'
refs: [jys, roc]

items:
    #- name:  pre
    #  title: ''
    #  type:  Preformatted

    - name: text
      title: Conditions
      type:  Html
      clearWith:
          - groups

    - name: rocTable
      title: ROC Results
      type: Table
      visible: (showTable)
      clearWith:
          - vars
          - class
          - groups
          - selgroup
          - theBest
          - cmpDeLong
          - ciAUC
          - ciWidth
          - perc
          - direction
          - sepROC
          - splitROC
      columns:
          - name: var
            title: Predictor
            type: text
          - name: auc
            title: AUC
            type: number
          - name: auc_ci
            title: CI
            type: text
            visible: (ciAUC)
          - name: cutoff
            title: Cut-off
            type: number
          - name: se
            title: Se
            type: number
          - name: sp
            title: Sp
            type: number
          - name: direction
            title: Direction
            type: text
            visible: (direction)
          - name: pval
            title: p (DeLong)
            type: number
            format: zto,pvalue

    - name: plot
      title: ROC by predictors
      type: Image
      #visible: (sepROC==FALSE)
      width:  500
      height: 500
      renderFun: .plot
      requiresData: true

    - name: plots
      title: ROC by groups
      type: Array
      visible: (sepROC)
      items: (vars)
      template:
          title: $key
          type: Image
          width:  500
          height: 500
          renderFun: .plot
          requiresData: true

    - name: splots
      title: Split ROC by predictors
      type: Array
      visible: (splitROC)
      items: (vars)
      template:
          title: $key
          type: Image
          width:  500
          height: 500
          renderFun: .plot
          requiresData: true

...
