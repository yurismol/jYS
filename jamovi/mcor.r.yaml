---
name:  mCOR
title: Correlation clustering
jrs:   '1.1'
refs: [jys, corr]

items:
    #- name:  pre
    #  title: ''
    #  type:  Preformatted

    - name: text
      title: Correlations
      type:  Html
      clearWith:
          - group

    - name: matrix
      visible: (tables)
      title: Correlation matrix
      type: Table
      description: a correlation matrix table
      rows: (vars)
      clearWith:
          - ciWidth
          - hyp
      columns:
          - name: .name[r]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (method=="pearson")
          - name: .stat[r]
            title: ""
            type: text
            content: r
            visible: (method=="pearson" && (ci || pval || n))

          - name: .name[rho]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (method=="spearman")
          - name: .stat[rho]
            title: ""
            type: text
            content: ρ
            visible: (method=="spearman" && (pval || n))

          - name: .name[tau]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (method=="kendall")
          - name: .stat[tau]
            title: ""
            type: text
            content: τ
            visible: (method=="kendall" && (pval || n))

          - name: .name[cil]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (method=="pearson" && ci)
          - name: .stat[cil]
            title: ""
            type: text
            content: CI Lower
            visible: (method=="pearson" && ci)

          - name: .name[ciu]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (method=="pearson" && ci)
          - name: .stat[ciu]
            title: ""
            type: text
            content: CI Upper
            visible: (method=="pearson" && ci)

          - name: .name[p]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (pval)
          - name: .stat[p]
            title: ""
            type: text
            content: p-value
            format: zto,pvalue
            visible: (pval)

          - name: .name[n]
            title: ""
            type: text
            content: ($key)
            combineBelow: true
            visible: (n)
          - name: .stat[n]
            title: ""
            type: text
            content: N
            visible: (n)

    - name: treeplot
      title: Hierarchical clustering tree
      type: Image
      visible: (hclust)
      width:  500
      height: 400
      renderFun: .treeplot
      requiresData: true

    - name: plot
      title: Correlation matrix
      type: Image
      visible: (plots)
      width:  500
      height: 500
      renderFun: .plot
      requiresData: true

    - name: rplots
      title: Intercluster Matrices
      type: Array
      visible: (plots && clustMat)
      template:
          type: Image
          renderFun: .rplot
          requiresData: true

    - name: glassoGroup
      title: Graphical Lasso (GLASSO) Partial Correlation Network
      type: Group
      visible: (glasso)
      refs: [glasso, qgraph]
      items:
        - name: glassoTable
          title: Partial correlation matrix
          type: Table
          visible: (glasso && glassoTable)
          rows: (vars)
          clearWith:
            - glassoType
            - glassoGamma
            - glassoRho
            - vars
            - group
            - selgroup
            - method
            - pval
            - flag
            - n
          columns:
            - name: .name[r]
              title: ""
              type: text
              content: ($key)
              combineBelow: true
              visible: (method=="pearson")
            - name: .stat[r]
              title: ""
              type: text
              content: r
              visible: (method=="pearson" && (pval || n))
            - name: .name[rho]
              title: ""
              type: text
              content: ($key)
              combineBelow: true
              visible: (method=="spearman")
            - name: .stat[rho]
              title: ""
              type: text
              content: ρ
              visible: (method=="spearman" && (pval || n))
            - name: .name[tau]
              title: ""
              type: text
              content: ($key)
              combineBelow: true
              visible: (method=="kendall")
            - name: .stat[tau]
              title: ""
              type: text
              content: τ
              visible: (method=="kendall" && (pval || n))
            - name: .name[p]
              title: ""
              type: text
              content: ($key)
              combineBelow: true
              visible: (pval)
            - name: .stat[p]
              title: ""
              type: text
              content: p-value
              format: zto,pvalue
              visible: (pval)
            - name: .name[n]
              title: ""
              type: text
              content: ($key)
              combineBelow: true
              visible: (n)
            - name: .stat[n]
              title: ""
              type: text
              content: N
              visible: (n)
        - name: glassoHubTable
          title: Centrality metrics (hub markers)
          type: Table
          visible: (glasso && glassoHub)
          clearWith:
            - glassoType
            - glassoGamma
            - glassoRho
            - vars
            - group
            - selgroup
            - method
          columns:
            - name: var
              title: "Variable"
              type: text
            - name: strength
              title: "Strength"
              type: number
            - name: closeness
              title: "Closeness"
              type: number
            - name: betweenness
              title: "Betweenness"
              type: number
            - name: influence
              title: "Expected Influence"
              type: number

        - name: glassoPlot
          title: Network plot
          type: Image
          visible: (glasso && glassoPlot)
          width: 500
          height: 500
          renderFun: .glassoPlot
          requiresData: true
          clearWith:
            - glassoType
            - glassoGamma
            - glassoRho
            - vars
            - group
            - selgroup
            - glassoPlotScale
            - glassoLabels
            - hclust
            - numClust
            - clustMet
            - clustCol
            - clustMan
            - method
...
