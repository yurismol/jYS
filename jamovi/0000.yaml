  - name: HI ROC classification
    path: ROC_HI.omv
    description: Healthy/Ill ROC Classification demonstration
  - name: BC ROC classification
    path: ROC_BLOOD.omv
    description: Blood cells multiple ROC Classification demonstration
  - name: BC Models ROC Estimation
    path: LOG_BLOOD.omv
    description: ROC estimation for binomial logistis models demonstration
  - name: CHD Models ROC Estimation
    path: LOG_CHD.omv
    description: ROC estimation for binomial logistis models demonstration
  - name: Missing Values Imputation
    path: MF_IRIS.omv
    description: Missing values imputation using the prediction power of Random Forests
  - name: Outliers identification and removal
    path: OUTL_IRIS.omv
    description: Identification, analysis and removal of data outliers by groups
  - name: Uncertain Interval (UI)
    path: UI_HI.omv
    description: Three-Way threshold determination in test results
  - name: UI for binomial logistis models
    path: UI_LOG.omv
    description: Uncertain Interval estimation for binomial logistis models
  - name: Neural Network Classification
    path: MLP.omv
