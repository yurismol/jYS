---
name:  mMLP
title: MLP Classifier
jrs:   '1.1'
refs: [jys, rip, bish, adam]

items:
    - name: text
      title: Conditions
      type: Html
      visible: false

    - name: infoTable
      title: Model Information & Accuracy
      type: Table
      rows: 6
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
      columns:
          - name: metric
            title: Metric
            type: text
          - name: value
            title: Value
            type: text

    - name: importanceTable
      title: Predictor Importance
      type: Table
      visible: (show_imp)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
      columns:
          - name: var
            title: Predictor
            type: text
          - name: imp
            title: Mean Decrease in Accuracy
            type: number
          - name: rank
            title: Rank
            type: integer

    - name: importancePlot
      title: Predictor Importance Chart
      type: Image
      visible: (show_imp)
      width:  500
      height: 350
      renderFun: .importancePlot
      requiresData: true
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang

    - name: topoPlot
      title: MLP Network Topology
      type: Image
      visible: (show_topo)
      width:  600
      height: 500
      renderFun: .topoPlot
      requiresData: true
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang

    - name: curvePlot
      title: MLP Learning Curve
      type: Image
      visible: (show_curve)
      width:  500
      height: 350
      renderFun: .curvePlot
      requiresData: true
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - val_split

    - name: matrixTable
      title: Confusion Matrix
      type: Table
      visible: (show_matrix)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
      columns:
          - name: actual
            title: Actual Class
            type: text
          - name: predicted
            title: Predicted Class
            type: text
          - name: count
            title: Count
            type: integer

    - name: statsTable
      title: Performance Statistics
      type: Table
      visible: (show_matrix)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
      columns:
          - name: metric
            title: Metric
            type: text
          - name: trainVal
            title: Training
            type: number
          - name: cvVal
            title: Validation
            type: number

    - name: misclassifiedTable
      title: Misclassified Cases
      type: Table
      visible: (show_misclassified)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
      columns:
          - name: row_id
            title: Row
            type: integer
          - name: actual
            title: Actual Class
            type: text
          - name: predicted
            title: Predicted Class
            type: text
          - name: prob
            title: Probability
            type: number
          - name: error_type
            title: Error Type
            type: text

    - name: riskTable
      title: Risk Stratification
      type: Table
      visible: (show_risk_strat)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
          - risk_cut_low
          - risk_cut_high
      columns:
          - name: category
            title: Risk Category
            type: text
          - name: range
            title: Probability Range
            type: text
          - name: total
            title: Total (N)
            type: integer
          - name: total_pct
            title: Total (%)
            type: number
          - name: events
            title: Events (n)
            type: integer
          - name: event_rate
            title: Observed Event Rate (%)
            type: number

    - name: rocTable
      title: ROC Quantitative Evaluation
      type: Table
      visible: (show_roc && show_roc_table)
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
          - roc_x
          - roc_unit
          - multiclass_roc_type
          - palBrewer
          - show_roc_cut
          - show_roc_table
      columns:
          - name: part
            title: Curve
            type: text
          - name: auc
            title: AUC
            type: number
          - name: cutoff
            title: Cut-off
            type: number
          - name: se
            title: Sensitivity (Se)
            type: number
          - name: sp
            title: Specificity (Sp)
            type: number
          - name: direction
            title: Direction
            type: text

    - name: rocPlot
      title: ROC Analysis Comparison
      type: Array
      visible: (show_roc)
      template:
          type: Image
          width:  500
          height: 500
          renderFun: .rocPlot
          requiresData: true
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
          - roc_x
          - roc_unit
          - multiclass_roc_type
          - palBrewer
          - show_roc_cut
          - show_roc_table

    - name: predClass
      title: Predicted Class
      type: Output
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds

    - name: predProb
      title: Predicted Probability
      type: Output
      clearWith:
          - dep
          - covs
          - factors
          - hidden_structure
          - activation
          - out_activation
          - decay
          - maxit
          - rang
          - partition
          - val_split
          - cv_folds
...
