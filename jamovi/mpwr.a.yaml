---
name:  mPWR
title: A Priori Power Analysis
menuGroup: Power
menuSubgroup: jYS
version: '1.0.15'
jas: '1.2'

options:
    - name: calc
      title: 'Purpose of Calculation'
      type: List
      options:
        - name: n
          title: "N per group"
        - name: power
          title: "Power"
        - name: es
          title: "Effect size"
      default: n

    - name: design
      title: 'Design'
      type: List
      options:
        - name: independent
          title: "Independent Samples (Student)"
        - name: welch
          title: "Independent Samples (Welch)"
        - name: independent_np
          title: "Independent Samples (Wilcoxon)"
        - name: paired
          title: "Paired Samples (Student)"
        - name: paired_np
          title: "Paired Samples (Wilcoxon)"
        - name: one.sample
          title: "One Sample (Student)"
        - name: one.sample_np
          title: "One Sample (Wilcoxon)"
        - name: onecor
          title: "One Sample Correlation (Pearson)"
        - name: onecor_np
          title: "One Sample Correlation (Spearman)"
        - name: linear
          title: "Linear Regression (F-Test)"
        - name: logistic
          title: "Logistic Regression (Wald Z-Test)"
        - name: chisq
          title: "Chi-square Goodness-of-Fit / Independence (Chi-square Test)"
        - name: anova
          title: "ANOVA / ANCOVA (F-Test)"
      default: independent

    - name: es
      title: "Minimally-interesting effect size"
      type: Number
      min: 0.01
      default: .5

    - name: power
      title: "Minimum desired power"
      type: Number
      min: 0
      max: 1
      default: .8

    - name: n
      title: "N per group (or pairs/sample)"
      type: Integer
      min: 2
      default: 30

    - name: alt
      title: Tails
      type: List
      options:
        - "two.sided"
        - "one.sided"
      default: "two.sided"

    - name: alpha
      title: "α (type I error rate)"
      type: Number
      min: 0
      default: 0.05

    #- name: alpha
    #  title: "&alpha; (type I error rate)"
    #  type: List
    #  options:
    #    - name: '0.1'
    #      title: '0.1'
    #    - name: '0.05'
    #      title: '0.05'
    #    - name: '0.01'
    #      title: '0.01'
    #    - name: '0.001'
    #      title: '0.001'
    #  default: '0.05'

    - name: n_ratio
      title: "Sample size ratio (N<sub>2</sub>/N<sub>1</sub>)"
      type: Number
      min: 0
      default: 1

    - name: var_ratio
      title: "Variance ratio (SD\u2081\u00B2 / SD\u2082\u00B2)"
      type: Number
      min: 0.01
      default: 1

    - name: plot_err
      title: "Type 1 and Type 2 Error Plots"
      type: Bool
      default: false

    - name: power_curve
      title: "Power Curve (Power by N)"
      type: Bool
      default: false

    - name: power_es_curve
      title: "Power by Effect Size Curve"
      type: Bool
      default: false

    - name: n_es_curve
      title: "N by Effect Size Curve"
      type: Bool
      default: false

    - name: k_total
      title: "Total predictors"
      type: Integer
      min: 1
      default: 2

    - name: k_tested
      title: "Tested predictors"
      type: Integer
      min: 1
      default: 2

    - name: base_prob
      title: "Base probability"
      type: Number
      min: 0.001
      max: 0.999
      default: 0.15

    - name: r2_predictor
      title: "R\u00B2 of predictor X with other covariates"
      type: Number
      min: 0
      max: 0.99
      default: 0

    - name: df_chisq
      title: "Degrees of freedom"
      type: Integer
      min: 1
      default: 1

    - name: factor_levels
      title: "Number of factor levels/groups"
      type: Integer
      min: 2
      default: 3

    - name: k_covariates
      title: "Number of covariates"
      type: Integer
      min: 0
      default: 0
...
