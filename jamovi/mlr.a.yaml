---
name:  mLR
title: Logistic Regression
menuGroup: jYS
menuSubgroup: Regression & Classification
menuTitle: Logistic Regression
description:
    main: Logistic Regression with feature selection. Note that cross-validation fold partitioning uses a hardcoded random seed (42) for reproducibility.
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data

    - name: dep
      title: Dependent Variable (Target)
      type: Variable
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor
      required: true

    - name: covs
      title: Covariates (Continuous Predictors)
      type: Variables
      suggested:
        - continuous
      permitted:
        - numeric

    - name: factors
      title: Factors (Categorical Predictors)
      type: Variables
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor

    - name: group
      title: Filter Variable
      required: false
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor
      type: Variable

    - name: selgroup
      title: Select group for filtering
      type: Level
      variable: (group)

    - name: method
      title: Feature Selection Method
      type: List
      options:
        - name: manual
          title: Manual (Use All Predictors)
        - name: forward
          title: Forward Stepwise Selection (AIC)
        - name: backward
          title: Backward Stepwise Elimination (AIC)
        - name: lasso
          title: LASSO L1 Regularization
        - name: elastic
          title: ElasticNet (L1 + L2 Regularization)
      default: manual

    - name: elastic_alpha
      title: ElasticNet Alpha (L1 Ratio)
      type: Number
      min: 0.0
      max: 1.0
      default: 0.5

    - name: lasso_penalty
      title: Regularization Penalty Choice
      type: List
      options:
        - name: min
          title: Lambda Min (Minimum CV Error)
        - name: 1se
          title: Lambda 1SE (Most Sparse Model)
      default: min

    - name: partition
      title: Validation Method
      type: List
      options:
        - name: holdout
          title: Hold-out Validation Split
        - name: kfold
          title: K-Fold Cross-Validation
        - name: repeated_kfold
          title: Repeated Stratified K-Fold CV
      default: kfold

    - name: val_split
      title: Hold-out Validation Split (%)
      type: Number
      min: 10
      max: 90
      default: 30

    - name: cv_folds
      title: Cross-Validation Folds (K)
      type: Integer
      min: 2
      max: 20
      default: 5

    - name: cv_repeats
      title: Cross-Validation Repeats
      type: Integer
      min: 1
      max: 10
      default: 3

    - name: show_formula
      title: Show Model Formula
      type: Bool
      default: true

    - name: show_roc
      title: ROC Analysis
      type: Bool
      default: false

    - name: roc_x
      title: ROC X-axis Coordinate
      type: List
      options:
        - name: spec
          title: Specificity
        - name: 1spec
          title: 1 - Specificity
      default: 1spec

    - name: roc_unit
      title: ROC Axis Units
      type: List
      options:
        - name: decimal
          title: Decimal (0 to 1)
        - name: percent
          title: Percentage (%)
      default: percent

    - name: palBrewer
      title: Brewer's qualitative palette
      type: List
      options:
        - title: None
          name:  none
        - title: Accent
          name:  Accent
        - title: Dark2
          name:  Dark2
        - title: Paired
          name:  Paired
        - title: Pastel1
          name:  Pastel1
        - title: Set1
          name:  Set1
        - title: Set2
          name:  Set2
        - title: Set3
          name:  Set3
      default: Dark2

    - name: seed
      title: Seed number
      type: Integer
      default: 42

    - name: predClass
      title: Predicted Class
      type: Output

    - name: predProb
      title: Predicted Probability
      type: Output
...
