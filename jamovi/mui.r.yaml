---
name:  mUI
title: Uncertain Interval (UI)
jrs:   '1.1'
refs: [jys, uir, lsh, lshd]

items:
    #- name:  text
    #  title: Uncertain Interval (UI)
    #  type:  Preformatted

    - name: stat
      title: Intervals Estimation
      type: Group
      #refs: [mf, rg, mr]
      items:
        - name: uistat
          title: Uncertain Interval (UI)
          type: Table
          clearWith:
              - ref
              - test
          rows: (test)
          columns:
              - name: var
                title: Predictor
                type: text
                content: ($key)
              - name: dir
                title: Direction
                type: text
              - name: int
                title: Intersection
                type: number
              - name: lth
                title: Lower threshold
                type: number
                visible: (UImethod != "noUI")
              - name: uth
                title: Upper threshold
                type: number
                visible: (UImethod != "noUI")
    
        - name: mcistat
          title: More Certain Interval (MCI)
          type: Table
          clearWith:
              - ref
              - test
          rows: (test)
          visible: (isMCI)
          columns:
              - name: var
                title: Predictor
                type: text
                content: ($key)
              - name: C
                title: Concordance
                type: number
              - name: Se
                title: Se
                type: number
              - name: Sp
                title: Sp
                type: number
              - name: CCR
                title: CCR
                type: number
              - name: bal
                title: Balance
                type: number
              - name: NPV
                title: NPV
                type: number
              - name: PPV
                title: PPV
                type: number
              - name: SNPV
                title: SNPV
                type: number
              - name: SPPV
                title: SPPV
                type: number
              - name: LRm
                title: LR-
                type: number
              - name: LRp
                title: LR+
                type: number
              - name: Prevalence
                title: Prevalence
                type: number
    
        - name: intstat
          title: Proportions of Intervals
          type: Table
          clearWith:
              - ref
              - test
          #rows: (test)
          visible: (isProp)
          columns:
              - name: var
                title: Predictor
                type: text
                #content: ($key)
              - name: lev
                title: Level
                type: text

        - name: rocTable
          title: ROC Quantitative Evaluation
          type: Table
          clearWith:
              - ref
              - test
              - UImethod
              - show_roc_cut
              - show_roc_table
          rows: (test)
          visible: (isROC && show_roc_table)
          columns:
              - name: var
                title: Predictor
                type: text
                content: ($key)
              - name: auc
                title: AUC
                type: number
              - name: cutoff
                title: Cut-off
                type: number
              - name: se
                title: Sensitivity (Se)
                type: number
              - name: sp
                title: Specificity (Sp)
                type: number
              - name: direction
                title: Direction
                type: text

    - name: plotsTGR
      title: Two-graph ROC curves
      type: Array
      visible: (isTGR)
      items: (test)
      #refs: []
      template:
          title: $key
          type: Image
          width:  500
          height: 500
          renderFun: .plotTGR
          requiresData: true

    - name: plotsMD
      title: Mixed Densities
      type: Array
      visible: (isMD)
      items: (test)
      template:
          title: $key
          type: Image
          width:  500
          height: 500
          renderFun: .plotMD
          requiresData: true

    - name: plotsROC
      title: ROC curves
      type: Array
      visible: (isROC)
      items: (test)
      template:
          title: $key
          type: Image
          width:  500
          height: 500
          renderFun: .plotROC
          requiresData: true
      clearWith:
          - ref
          - test
          - UImethod
          - show_roc_cut

    - name: decision
      title: Proposed decision
      type: Output
      #initInRun: true

...
