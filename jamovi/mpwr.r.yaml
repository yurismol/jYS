---
name:  mPWR
title: A Priori Power Analysis
jrs:   '1.1'
refs:
    - jys
    - pwrss_pkg
    - bulus_2024
    - bulus_2023
    - chow_2018
    - cohen_1988
    - lakens_2017

items:
    - name:  powerTable
      title: A Priori Power Analysis Results
      type:  Table
      rows:  1
      clearWith:
        - calc
        - design
        - es
        - power
        - n
        - alt
        - alpha
        - n_ratio
        - var_ratio
        - k_total
        - k_tested
        - base_prob
        - r2_predictor
        - df_chisq
        - factor_levels
        - k_covariates
        - margin
        - crt
        - cluster_size
        - icc
      columns:
        - name: n1
          title: N1
          type: integer
        - name: n2
          title: N2
          type: integer
        - name: k1
          title: Clusters 1
          type: integer
          visible: (crt && (design:independent || design:welch || design:paired || design:one.sample))
        - name: k2
          title: Clusters 2
          type: integer
          visible: (crt && (design:independent || design:welch || design:paired || design:one.sample))
        - name: power
          title: Power
          type: number
          format: pvalue
        - name: es
          title: Effect Size
          type: number
        - name: n1_user
          title: N1
          type: integer
          superTitle: User Defined
        - name: n2_user
          title: N2
          type: integer
          superTitle: User Defined
        - name: es_user
          title: Effect Size
          type: number
          superTitle: User Defined
        - name: power_user
          title: Power
          type: number
          format: pvalue
          superTitle: User Defined
        - name: alpha
          title: 'α'
          type: number
          format: pvalue
          superTitle: User Defined
        - name: alt
          title: Alternative
          type: text
          superTitle: User Defined

    - name:  plot
      title: Type 1 and Type 2 Error Plots
      type:  Image
      width: 500
      height: 400
