title: Multivariate outliers identification and removal
name: mMOUT
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Outliers identification
    collapsed: false
    stretchFactor: 1
    children:
      - type: Label
        label: Method
        children:
          - type: RadioButton
            name: method_classic
            optionName: method
            optionPart: classic
          - type: RadioButton
            name: method_robust
            optionName: method
            optionPart: robust
      - type: ComboBox
        name: alpha
      - type: CheckBox
        name: outind

  - type: CollapseBox
    label: Plots
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: showPlots
        children:
          - type: ComboBox
            name: plotType
            enable: (showPlots)

  - type: CollapseBox
    label: Save
    collapsed: true
    stretchFactor: 1
    children:
      - type: Output
        name: outDist
      - type: Output
        name: outFlag
      - type: Output
        name: remOut
